- question: What is your preferred work environment?
  answer: 'Remote or hybrid. Remote is where I do my best deep work; hybrid keeps the whiteboarding and team-building I''d miss going fully solo. Either way, what matters more is the team: people who push each other''s thinking and care about the craft.'

- question: What technologies do you specialize in?
  answer: 'Full stack, with the deepest roots in PHP and JavaScript. On the backend that''s Node, MySQL and PostgreSQL, REST and SOAP integrations, plus the DevOps glue (Docker, AWS, Jenkins) that keeps things shipping. On the frontend, React, Svelte, Vue, and lately the VoidZero toolchain (Vite, Oxlint, Oxfmt). I''ve also spent two decades in and around Moodle, both as a contributor and a plugin author.'

- question: How do you approach team leadership?
  answer: 'Collaborative, but with a point of view. I want engineers to own their work and disagree with me when they should; my job is to keep the team''s goals aligned with the business, unblock people, and step in with a call when consensus stalls. Mentoring is the part I enjoy most: I''ve watched a number of interns and junior engineers grow into tech leads, and that''s the work I''ll still be making time for in any role.'

- question: What's your biggest professional achievement?
  answer: 'Building and running the CCLE summer internship program at UCLA from 2011 to 2020. Each cohort shipped real work on Moodle: database performance, caching, API design, web services. A lot of those interns are now engineers and tech leads in the industry, and that program is the achievement I''d put first, ahead of anything I can point to on GitHub.'
