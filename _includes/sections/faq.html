<section id="faq" class="faq">
  <div class="faq__inner">
    <header class="faq__header">
      <div class="chapter" aria-hidden="true">05</div>
      <h2 class="faq__heading">FAQ</h2>
    </header>

    <div class="faq__list">
      {% for item in site.data.faq %}
      <details class="faq__item">
        <summary class="faq__question">
          <span class="faq__question-text">{{ item.question }}</span>
          <svg class="faq__chevron" viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="m4 6 4 4 4-4"/>
          </svg>
        </summary>
        <div class="faq__answer">
          <p>{{ item.answer }}</p>
        </div>
      </details>
      {% endfor %}
    </div>
  </div>
</section>
