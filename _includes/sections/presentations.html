<section id="presentations" class="presentations">
  <div class="presentations__inner">
    <header class="presentations__header">
      <h2 class="presentations__heading">Presentations</h2>
    </header>

    <ol class="presentations__grid" aria-label="Talks and presentations">
      {% for presentation in site.data.presentations %}
      {% assign slides_url = presentation.embed_url | replace: '/embed', '/preview' %}
      <li class="presentations__item">
        <div class="presentations__preview">
          <iframe
            data-src="{{ presentation.embed_url }}"
            title="{{ presentation.title }}"
            loading="lazy"
            frameborder="0"
            allowfullscreen
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          ></iframe>
        </div>
        <h3 class="presentations__title">
          <a class="presentations__link" href="{{ slides_url }}" target="_blank" rel="noopener noreferrer">
            <span class="presentations__name">{{ presentation.title }}</span>
            <span class="presentations__arrow" aria-hidden="true">&rarr;</span>
          </a>
        </h3>
        <p class="presentations__date">{{ presentation.date | date: "%B %Y" }}</p>
        <p class="presentations__description">{{ presentation.description }}</p>
      </li>
      {% endfor %}
    </ol>
  </div>
</section>
