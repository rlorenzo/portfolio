<section id="experience" class="experience">
  <div class="experience__inner">
    <header class="experience__header">
      <h2 class="experience__heading">Experience</h2>
    </header>

    <ol class="experience__list" aria-label="Career history">
      {% for role in site.data.experience %}
      <li class="experience__role">
        <p class="experience__dates">{{ role.dates | replace: ' - ', ' – ' }}</p>
        <div class="experience__detail">
          <h3 class="experience__title">{{ role.title }}</h3>
          <p class="experience__company">{{ role.company }}</p>
          <ul class="experience__highlights">
            {% for highlight in role.highlights %}
            <li class="experience__highlight">{{ highlight }}</li>
            {% endfor %}
          </ul>
        </div>
      </li>
      {% endfor %}
    </ol>
  </div>
</section>
