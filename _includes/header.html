<header id="site-header" class="site-header">
  <a href="#hero" class="site-header__skip">Skip to content</a>
  <div class="site-header__inner">
    <a href="{{ '/' | relative_url }}" class="site-header__wordmark">{{ site.title }}</a>

    <nav class="site-nav" aria-label="Primary">
      {% for item in site.data.navigation %}
      <a href="{{ item.url }}" class="site-nav__link nav-link">{{ item.title }}</a>
      {% endfor %}
      <a href="#contact" class="site-nav__contact nav-link">Contact</a>
    </nav>

    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to dark theme" aria-pressed="false">
      <svg id="theme-icon-light" class="theme-toggle__icon" viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="8" r="3"/>
        <line x1="8" y1="1.25" x2="8" y2="3"/>
        <line x1="8" y1="13" x2="8" y2="14.75"/>
        <line x1="1.25" y1="8" x2="3" y2="8"/>
        <line x1="13" y1="8" x2="14.75" y2="8"/>
        <line x1="3.25" y1="3.25" x2="4.5" y2="4.5"/>
        <line x1="11.5" y1="11.5" x2="12.75" y2="12.75"/>
        <line x1="3.25" y1="12.75" x2="4.5" y2="11.5"/>
        <line x1="11.5" y1="4.5" x2="12.75" y2="3.25"/>
      </svg>
      <svg id="theme-icon-dark" class="theme-toggle__icon" viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13.5 9.75A5.5 5.5 0 1 1 6.25 2.5a4.5 4.5 0 0 0 7.25 7.25Z"/>
      </svg>
    </button>

    <button id="mobile-menu-button" class="mobile-menu-button" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">
      <svg class="mobile-menu-button__icon mobile-menu-button__icon--bars" viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="2" y1="4.75" x2="14" y2="4.75"/>
        <line x1="2" y1="8" x2="14" y2="8"/>
        <line x1="2" y1="11.25" x2="14" y2="11.25"/>
      </svg>
      <svg class="mobile-menu-button__icon mobile-menu-button__icon--close" viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="3.75" y1="3.75" x2="12.25" y2="12.25"/>
        <line x1="12.25" y1="3.75" x2="3.75" y2="12.25"/>
      </svg>
    </button>
  </div>

  <div id="mobile-menu" class="mobile-menu hidden">
    {% for item in site.data.navigation %}
    <a href="{{ item.url }}" class="mobile-menu__link">{{ item.title }}</a>
    {% endfor %}
    <a href="#contact" class="mobile-menu__link mobile-menu__link--contact">Contact</a>
  </div>
</header>

<button id="back-to-top" class="back-to-top opacity-0 invisible" aria-label="Back to top">
  <svg class="back-to-top__icon" viewBox="0 0 16 16" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 13V3"/>
    <path d="m3.5 7.5 4.5-4.5 4.5 4.5"/>
  </svg>
</button>
