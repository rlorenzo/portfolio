<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="{{ site.author | default: site.title }}">

  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon/favicon.svg' | relative_url }}">
  <link rel="icon" href="{{ '/assets/favicon/favicon.ico' | relative_url }}" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon/favicon-16x16.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/favicon/apple-touch-icon.png' | relative_url }}">
  <link rel="manifest" href="{{ '/assets/favicon/site.webmanifest' | relative_url }}">
  <meta name="theme-color" content="#ffffff">

  <!-- Preload critical resources for faster FCP/LCP -->
  <link rel="preload" href="{{ "/assets/css/tailwind.css" | relative_url }}?v={{ site.time | date: '%s' }}" as="style">
  <link rel="preload" as="image" imagesrcset="{{ '/assets/profile-320.webp' | relative_url }} 320w, {{ '/assets/profile-640.webp' | relative_url }} 640w" imagesizes="(min-width: 768px) 320px, 42vw" type="image/webp">

  <!-- Main CSS -->
  <link rel="stylesheet" href="{{ "/assets/css/tailwind.css" | relative_url }}?v={{ site.time | date: '%s' }}">

  <!-- Preconnect to font origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Non-critical font CSS loaded asynchronously -->
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,400;12..96,75..100,500;12..96,75..100,600;12..96,75..100,700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,400;12..96,75..100,500;12..96,75..100,600;12..96,75..100,700&display=swap" rel="stylesheet" />
  </noscript>

  <!-- Theme detection script to prevent FOUC -->
  <script>
    (function() {
      var theme = localStorage.getItem('theme');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  {% seo %}
</head>
