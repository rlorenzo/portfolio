name: Lighthouse CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device: [mobile, desktop]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          lfs: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626 # v1.320.0
        with:
          ruby-version: '3.3.6'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Build CSS
        run: npm run build:css

      - name: Build JavaScript
        run: npm run build:js

      - name: Build Jekyll site
        run: JEKYLL_ENV=production bundle exec jekyll build --baseurl ""

      - name: Serve site
        run: npx serve _site -p 4000 &

      - name: Wait for server
        run: npx wait-on http://localhost:4000 --timeout 30000

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # 12.6.2
        with:
          configPath: .lighthouserc.${{ matrix.device }}.json
          uploadArtifacts: true
          artifactName: lighthouse-results-${{ matrix.device }}

      - name: Print Lighthouse scores
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            const dir = '.lighthouseci';
            const file = fs.readdirSync(dir).find(f => f.endsWith('.json') && f.startsWith('lhr'));
            if (!file) { console.log('No report found'); process.exit(0); }
            const { categories } = JSON.parse(fs.readFileSync(dir + '/' + file));
            console.log('\nLighthouse scores:');
            Object.values(categories).forEach(c =>
              console.log('  ' + c.title.padEnd(16) + Math.round(c.score * 100))
            );
          "
