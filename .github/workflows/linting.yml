name: Linting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci
        env:
          HUSKY: 0  # Skip Husky installation in CI

      - name: Run CSS linting
        run: npm run lint:css

      - name: Run JavaScript linting
        run: npm run lint:js

      - name: Run Markdown linting
        run: npm run lint:md

      - name: Run fallow (dead code + duplication)
        run: npm run lint:fallow

  jekyll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: '3.3.6'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci
        env:
          HUSKY: 0  # Skip Husky installation in CI

      - name: Install Ruby dependencies
        run: bundle install

      - name: Build Jekyll site
        run: npm run build

      - name: Run HTML linting
        run: npm run lint:html
