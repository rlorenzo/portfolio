name: Linting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci
        env:
          HUSKY: 0  # Skip Husky installation in CI

      - name: Run CSS linting
        run: npm run lint:css

      - name: Run JavaScript linting
        run: npm run lint:js

      - name: Run Markdown linting
        run: npm run lint:md

      - name: Run fallow (dead code + duplication)
        run: npm run lint:fallow

  jekyll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@6e5d382445ae5590b7449d8b3bc8cb1c2c27f617 # v1.317.0
        with:
          ruby-version: '3.3.6'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci
        env:
          HUSKY: 0  # Skip Husky installation in CI

      - name: Install Ruby dependencies
        run: bundle install

      - name: Build Jekyll site
        run: npm run build

      - name: Run HTML linting
        run: npm run lint:html
